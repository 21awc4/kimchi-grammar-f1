name: 자꾸나
definitions:
  - slug: suggestion
    name: Suggestion
    english_alternatives: let's
    meaning: A way to express a suggestion to do a certain act together. This is identical in meaning to :grammar[verb_자]{suggestion}, but carries a more intimate tone.
    examples:
      - type: simple
        sentence: 너만 먹지 말고 나도 좀 먹자꾸나.
        translated: Don't just eat it all yourself, let me have some too.
        audio_url:
      - type: simple
        sentence: 더욱 부지런해지자꾸나.
        translated: Let’s work even harder.
        audio_url:
      - type: simple
        sentence: 같이 놀자꾸나.
        translated: Let's hang out.
        audio_url:
metadata:
  type: verb
