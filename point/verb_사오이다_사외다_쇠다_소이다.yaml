point: 사오이다/사외다/쇠다/소이다
definitions:
  - slug: humble-statement
    name: Humble statement
    meaning: Used to express an action or simple statement humbly in the 하소서체 speech level.
    examples:
      - type: simple
        sentence: 그만 <f>가겠쇠다</f>.
        translated: I'm heading out.
        audio_url: 
      - type: simple
        sentence: 아비가 산삼 효험으로 병은 좀 나았사오나 소인 옥에 있는 동안에 <f>죽었소이다</f>.
        translated: My father’s illness improved somewhat thanks to the wild ginseng, but he passed away while I was in prison.
        audio_url: 
      - type: simple
        sentence: 우리에겐 우리의 임무가 <f>있사오이다</f>.
        translated: We have a mission to fulfill.
        audio_url: 
metadata:
  type: verb
details: |-
  # Usage {usage}
  <f>사오이다</f> is the full original form and 사외다, 쇠다, and 소이다 are all shortforms for 사오이다. 
  
  # What is 하소서체? {#what-is-하소서체?}

  <f>하소서체</f> is honorific speech used in archaic Korean; used to extremely respectfully address the listener. To modern
  Korean speakers this level of speech is perceived as an archaic style used only during the monarchical era.
  In modern Korean <f>하소서체</f> is functionally used only in literary expressions, and it is considered natural to use only
  when addressing a deity. You will encounter <f>하소서체</f> in period dramas, traditional literature, the bible, prayers
  to God, and similar.  :source[https://namu.wiki/w/하소서체]
